<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Envío</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">📦 LogiTrack</h1>

  <nav>
    <a href="index.html">Listado de Envíos</a>
    <a class="active">Crear Envío</a>
  </nav>

  <div class="user">
    <span id="nombreUsuario">Usuario</span> |
    <select id="rol">
      <option value="operador">Operador</option>
      <option value="supervisor">Supervisor</option>
    </select>

    <button id="cambiarUsuario">Cambiar</button>
  </div>
</header>

<main class="container">

  <h2>Crear Nuevo Envío</h2>
  <p class="subtitle">Complete la información para registrar un nuevo envío</p>

  <form id="form-envio">

    <!-- INFORMACIÓN GENERAL -->
    <div class="card-form">
      <h3>Información General</h3>

      <label for="remitente">Nombre del remitente</label>
      <input type="text" id="remitente" name="remitente" required>

      <label for="destinatario">Nombre del destinatario</label>
      <input type="text" id="destinatario" name="destinatario" required>
    </div>

    <!-- ORIGEN -->
    <div class="card-form">
      <h3>Origen</h3>

      <label for="ciudadOrigen">Ciudad</label>
      <input type="text" id="ciudadOrigen" name="ciudadOrigen" required>

      <label for="paisOrigen">País</label>
      <input type="text" id="paisOrigen" name="paisOrigen" required>

      <label for="direccionOrigen">Dirección</label>
      <input type="text" id="direccionOrigen" name="direccionOrigen" required>
    </div>

    <!-- DESTINO -->
    <div class="card-form">
      <h3>Destino</h3>

      <label for="ciudadDestino">Ciudad</label>
      <input type="text" id="ciudadDestino" name="ciudadDestino" required>

      <label for="paisDestino">País</label>
      <input type="text" id="paisDestino" name="paisDestino" required>

      <label for="direccionDestino">Dirección</label>
      <input type="text" id="direccionDestino" name="direccionDestino" required>
    </div>

    <!-- CARACTERÍSTICAS DEL ENVÍO -->
    <div class="card-form">
      <h3>Características del Envío</h3>

      <label for="distanciaKm">Distancia (km)</label>
      <input type="number" id="distanciaKm" name="distanciaKm" step="0.1" required>

      <label for="tipoEnvio">Tipo de envío</label>
      <select id="tipoEnvio" name="tipoEnvio">
        <option value="normal">Normal</option>
        <option value="express">Express</option>
      </select>

      <label for="ventanaHoraria">Ventana horaria</label>
      <select id="ventanaHoraria" name="ventanaHoraria">
        <option value="mañana">Mañana</option>
        <option value="tarde">Tarde</option>
        <option value="noche">Noche</option>
      </select>

      <label for="volumen">Volumen</label>
      <input type="number" id="volumen" name="volumen" step="0.1" required>

      <label for="saturacionRuta">Saturación de ruta</label>
      <input type="number" id="saturacionRuta" name="saturacionRuta" step="0.1" min="0" max="1" required>

      <label>
        <input type="checkbox" id="fragil" name="fragil">
        Contiene material frágil
      </label>

      <label>
        <input type="checkbox" id="frio" name="frio">
        Requiere cadena de frío
      </label>
    </div>

    <!-- NOTAS -->
    <div class="card-form">
      <h3>Notas Adicionales</h3>
      <textarea id="notas" name="notas" placeholder="Instrucciones especiales"></textarea>
    </div>

    <!-- BOTONES -->
    <div class="botones">

      <button type="button" class="btn-cancelar" onclick="window.location.href='index.html'">
        Cancelar
      </button>

      <button type="submit" class="btn-crear">
        Crear Envío
      </button>

    </div>

  </form>

</main>

<script src="app.js"></script>

</body>
</html>
