<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogiTrack</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="navbar">
  <h1 class="logo">📦 LogiTrack</h1>

  <nav>
    <a class="active">Listado de Envíos</a>
    <a href="crear.html">Crear Envío</a>
  </nav>

  <div class="user">
    <span id="nombreUsuario">Usuario</span> |
    <select id="rol">
      <option value="operador">Operador</option>
      <option value="supervisor">Supervisor</option>
    </select>

    <button id="cambiarUsuario">Cambiar</button>
  </div>
</header>

<main class="container">

  <!-- Cards dinámicas -->
  <section class="cards">
    <div class="card">Total de Envíos: <b id="totalEnvios">-</b></div>
    <div class="card warning">En Sucursal: <b id="enSucursal">-</b></div>
    <div class="card info">En Tránsito: <b id="enTransito">-</b></div>
    <div class="card success">Entregados: <b id="entregados">-</b></div>
  </section>

  <!-- Buscador -->
  <div class="search-container">
    <input 
      type="text"
      id="buscador"
      class="search" 
      placeholder="🔍 Buscar por tracking ID o destinatario..."
      autocomplete="off"
    >
  </div>

  <!-- Tabla -->
  <table>
    <thead>
      <tr>
        <th>Tracking ID</th>
        <th>Destinatario</th>
        <th>Prioridad</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td colspan="6">Cargando envíos...</td>
      </tr>
    </tbody>
  </table>

</main>

<script src="app.js"></script>
<script src="index.js" defer></script>

</body>
</html>
