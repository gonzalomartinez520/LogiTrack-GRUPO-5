<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle del Envío</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<header class="navbar">
  <h1 class="logo">📦 LogiTrack</h1>

  <nav>
    <a href="index.html">Listado de Envíos</a>
    <a href="crear.html">Crear Envío</a>
  </nav>

  <div class="user">
    <span id="nombreUsuario">Usuario</span> |
    <select id="rol">
      <option value="operador">Operador</option>
      <option value="supervisor">Supervisor</option>
    </select>

    <button id="cambiarUsuario">Cambiar</button>
  </div>
</header>

<main class="container">

<a href="index.html" class="volver">← Volver al listado</a>

<h2>Detalle del Envío</h2>
<p class="tracking">Tracking ID: <span id="tracking"></span></p>

<!-- Estado -->
<div class="estado">
  <div>
    <h3>Estado del Envío</h3>
    <p class="subtitle">Solo los supervisores pueden cambiar el estado</p>
  </div>

  <span id="estado" class="badge">-</span>
</div>

<!-- BOTONES SUPERVISOR -->
<div id="accionesSupervisor" style="margin: 15px 0;"></div>

<!-- Información General -->
<div class="card">
  <h3>Información General</h3>

  <div class="grid2">

    <div>
      <label>Remitente</label>
      <p id="remitente"></p>
    </div>

    <div>
      <label>Destinatario</label>
      <p id="destinatario"></p>
    </div>

    <div>
      <label>Fecha de Creación</label>
      <p id="fecha"></p>
    </div>

    <div>
      <label>Prioridad</label>
      <p id="prioridad"></p>
    </div>

  </div>
</div>

<!-- Origen y Destino -->
<div class="grid2">

  <div class="card">
    <h3>Origen</h3>

    <label>Ciudad</label>
    <p id="ciudadOrigen"></p>

  </div>

  <div class="card">
    <h3>Destino</h3>

    <label>Ciudad</label>
    <p id="ciudadDestino"></p>

  </div>

</div>

<!-- Historial -->
<div class="card">

  <h3>Historial de Cambios de Estado</h3>

  <ul id="historial">
    <li>Cargando historial...</li>
  </ul>

</div>

</main>

<script src="app.js"></script>
<script src="detalle.js"></script>

</body>
</html>
